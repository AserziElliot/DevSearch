<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevSearch Dashboard OS (Fixed Search)</title>
    <style>
        /* --- CONFIGURACIÓN NÚCLEO Y ANIMACIONES RGB --- */
        :root {
            --bg-dark: #05070f;
            --panel-bg: rgba(10, 15, 30, 0.7);
            --text-main: #f1f5f9;
            --text-muted: #64748b;
            --rgb-speed: 6s; 
        }

        @keyframes rgb-cycle {
            0% { border-color: #ff0055; box-shadow: 0 0 20px rgba(255, 0, 85, 0.4); }
            50% { border-color: #00ffff; box-shadow: 0 0 20px rgba(0, 255, 255, 0.4); }
            100% { border-color: #ff0055; box-shadow: 0 0 20px rgba(255, 0, 85, 0.4); }
        }

        @keyframes rgb-text {
            0% { color: #ff0055; text-shadow: 0 0 15px rgba(255, 0, 85, 0.5); }
            50% { color: #00ffff; text-shadow: 0 0 15px rgba(0, 255, 255, 0.5); }
            100% { color: #ff0055; text-shadow: 0 0 15px rgba(255, 0, 85, 0.5); }
        }

        * { box-sizing: border-box; user-select: none; margin: 0; padding: 0; }
        
        body {
            font-family: 'Fira Code', monospace, system-ui, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow: hidden;
            height: 100vh;
            cursor: none;
        }

        /* --- CURSOR INTERACTIVO RGB --- */
        .cursor-dot {
            width: 4px; height: 4px; background: #fff; position: fixed;
            transform: translate(-50%, -50%); border-radius: 50%; z-index: 10000; pointer-events: none;
        }
        .cursor-outline {
            width: 24px; height: 24px; border: 1px solid #ff0055; position: fixed;
            transform: translate(-50%, -50%); border-radius: 50%; z-index: 9999; pointer-events: none;
            animation: rgb-cycle var(--rgb-speed) linear infinite;
        }

        /* --- PANELES LATERALES (GLASSMORPHISM) --- */
        .sidebar {
            height: 100vh; width: 320px; position: fixed; z-index: 100; top: 0;
            background: var(--panel-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            padding: 80px 24px 24px 24px; transition: transform 0.4s cubic-bezier(0.075, 0.82, 0.165, 1);
            display: flex; flex-direction: column; gap: 15px; border-right: 1px solid rgba(255,255,255,0.05);
        }
        .sidebar.left { left: 0; transform: translateX(-100%); }
        .sidebar.right { right: 0; transform: translateX(100%); border-right: none; border-left: 1px solid rgba(255,255,255,0.05); }
        .sidebar.active { transform: translateX(0); border-color: transparent; animation: rgb-cycle var(--rgb-speed) linear infinite; }

        .sidebar-item {
            display: flex; align-items: center; gap: 15px; padding: 12px 16px;
            color: var(--text-main); text-decoration: none; background: rgba(255,255,255,0.02);
            border-radius: 10px; border: 1px solid rgba(255,255,255,0.03); transition: all 0.2s; cursor: none;
        }
        .sidebar-item:hover { background: rgba(255,255,255,0.08); transform: scale(1.02); }
        .sidebar-item svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2; }

        /* --- INTERFAZ CENTRAL --- */
        #main {
            height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle at center, rgba(15, 23, 42, 0.8) 0%, var(--bg-dark) 100%);
        }

        .openbtn {
            font-size: 13px; font-weight: 600; cursor: none; background: rgba(255,255,255,0.02);
            color: var(--text-main); padding: 12px 20px; border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px; position: absolute; top: 30px; display: flex; align-items: center; gap: 8px; transition: all 0.3s;
        }
        .openbtn:hover { animation: rgb-cycle var(--rgb-speed) linear infinite; }
        .left-btn { left: 30px; }
        .right-btn { right: 30px; }

        .search-container { text-align: center; width: 100%; max-width: 750px; padding: 0 20px; }
        .search-container h1 { font-size: 3rem; margin-bottom: 25px; font-weight: 700; color: #fff; }
        .search-container h1 span { animation: rgb-text var(--rgb-speed) linear infinite; }

        .search-box {
            display: flex; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px; padding: 8px 8px 8px 24px; align-items: center;
            animation: rgb-cycle var(--rgb-speed) linear infinite;
        }
        .search-box input[type="text"] {
            flex-grow: 1; padding: 12px 0; font-size: 16px; border: none; outline: none;
            background: transparent; color: #fff; cursor: none; font-family: inherit;
        }
        .search-box button {
            padding: 12px 28px; font-size: 14px; border: none; border-radius: 18px;
            background: #fff; color: #000; cursor: none; font-weight: 700; transition: all 0.2s;
        }

        /* --- CONTENEDOR DE RESULTADOS INTERNOS (NATIVO) --- */
        .results-wrapper {
            margin-top: 20px; background: rgba(10, 15, 30, 0.6); border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px; max-height: 40vh; overflow-y: auto; width: 100%; text-align: left;
            display: none; padding: 15px; backdrop-filter: blur(20px);
        }
        .results-wrapper.active { display: block; animation: rgb-cycle var(--rgb-speed) linear infinite; }

        .search-item {
            padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); text-decoration: none; display: block; cursor: none;
        }
        .search-item:last-child { border-bottom: none; }
        .search-item:hover { background: rgba(255,255,255,0.03); }
        .search-item h3 { color: #00ffff; font-size: 15px; margin-bottom: 4px; font-family: inherit; }
        .search-item p { color: var(--text-main); font-size: 13px; line-height: 1.4; }
        .search-item span { color: var(--text-muted); font-size: 11px; display: block; margin-top: 4px; }

        /* --- WIDGETS --- */
        .widget-box {
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 14px; padding: 16px; margin-bottom: 10px;
        }
        .widget-title { font-size: 11px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; letter-spacing: 1px;}
        #clockWidget { font-size: 24px; font-weight: 700; text-align: center; }
        #dateWidget { font-size: 12px; color: var(--text-muted); text-align: center; margin-top: 4px; }
        .ctrl-input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); padding: 10px; border-radius: 8px; color: #fff; font-size: 13px; outline: none; margin-bottom: 10px; cursor: none;}
        .closebtn { position: absolute; top: 25px; right: 25px; background: none; border: none; color: #fff; font-size: 20px; cursor: none;}
    </style>
</head>
<body>

    <div class="cursor-dot" id="cursorDot"></div>
    <div class="cursor-outline" id="cursorOutline"></div>

    <div id="leftMenu" class="sidebar left">
        <button class="closebtn" onclick="DevSearch('menu', 'leftMenu')">✕</button>
        <div class="widget-title">Ecosistema Enlaces</div>
        <div id="dynamicLinks"></div>

        <div class="widget-title" style="margin-top:20px;">Estudio Customizer</div>
        <div class="widget-box">
            <label class="widget-title">Añadir Marcador</label>
            <input type="text" id="newLinkName" class="ctrl-input" placeholder="Nombre">
            <input type="text" id="newLinkUrl" class="ctrl-input" placeholder="URL">
            <button class="sidebar-item" style="width:100%; justify-content:center; background:rgba(255,255,255,0.05);" onclick="addNewLink()">Inyectar</button>
        </div>
        <div class="widget-box">
            <label class="widget-title">Velocidad RGB</label>
            <input type="range" id="rgbSpeedRange" min="1" max="15" value="6" style="width:100%; accent-color:#ff0055; cursor:none;">
        </div>
    </div>

    <div id="rightMenu" class="sidebar right">
        <button class="closebtn" onclick="DevSearch('menu', 'rightMenu')">✕</button>
        <div class="widget-title">Módulo Cronos</div>
        <div class="widget-box">
            <div id="clockWidget">00:00:00</div>
            <div id="dateWidget">CARGANDO...</div>
        </div>
        <div class="widget-title">Terminal Notas</div>
        <div class="widget-box" style="padding:0;">
            <textarea id="devNotes" class="ctrl-input" style="height:150px; margin:0; resize:none; background:transparent; border:none;" placeholder="Notas..."></textarea>
        </div>
    </div>

    <div id="main">
        <button class="openbtn left-btn" onclick="DevSearch('menu', 'leftMenu')">⚙️ Config</button>
        <button class="openbtn right-btn" onclick="DevSearch('menu', 'rightMenu')">Widgets 📊</button>

        <div class="search-container">
            <h1>Dev<span>Search</span></h1>
            
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Busca aquí mismo sin salir de la página..." autofocus autocomplete="off">
                <button onclick="triggerSearch()">Buscar</button>
            </div>

            <div id="wrapper" class="results-wrapper"></div>
        </div>
    </div>

    <script>
        // --- FUNCIÓN DE BÚSQUEDA ASÍNCRONA NATIVA ---
        async function triggerSearch() {
            const query = document.getElementById('searchInput').value.trim();
            const wrapper = document.getElementById('wrapper');
            
            if(!query) return;

            wrapper.innerHTML = `<div style="color:var(--text-muted); text-align:center;">Buscando en la red...</div>`;
            wrapper.classList.add('active');

            try {
                // Usamos la API pública de Wikipedia para extraer resultados globales reales en texto plano (JSON) sin bloqueos de iframe
                const response = await fetch(`https://es.wikipedia.org/w/api.php?action=query&list=search&prop=info&inprop=url&utf8=&format=json&origin=*&srlimit=5&srsearch=${encodeURIComponent(query)}`);
                const data = await response.json();
                
                wrapper.innerHTML = ''; // Limpiamos el cargando

                if(data.query.search.length === 0) {
                    wrapper.innerHTML = `<div style="color:var(--text-muted); text-align:center;">No se encontraron resultados locales.</div>`;
                    return;
                }

                // Renderizado de las tarjetas de resultados con diseño nativo
                data.query.search.forEach(item => {
                    const itemUrl = `https://es.wikipedia.org/wiki/${encodeURIComponent(item.title)}`;
                    wrapper.innerHTML += `
                        <a href="${itemUrl}" target="_blank" class="search-item">
                            <h3>${item.title}</h3>
                            <p>${item.snippet}...</p>
                            <span>${itemUrl}</span>
                        </a>
                    `;
                });

                initCursorTrackers();

            } catch (error) {
                wrapper.innerHTML = `<div style="color:#ff0055; text-align:center;">Error de conexión con el nodo de búsqueda.</div>`;
            }
        }

        // --- SISTEMA INTERNO DEVSEARCH ---
        function DevSearch(action, payload) {
            if(action === 'menu') document.getElementById(payload).classList.toggle('active');
            if(action === 'setRGBspeed') document.documentElement.style.setProperty('--rgb-speed', `${payload}s`);
            if(action === 'renderLinks') {
                const container = document.getElementById('dynamicLinks');
                container.innerHTML = '';
                payload.forEach(link => {
                    container.innerHTML += `<a href="${link.url}" target="_blank" class="sidebar-item"><span>${link.name}</span></a>`;
                });
                initCursorTrackers();
            }
        }

        let userLinks = JSON.parse(localStorage.getItem('dev-links')) || [{ name: 'StackOverflow', url: 'https://stackoverflow.com' }];
        function addNewLink() {
            const name = document.getElementById('newLinkName').value;
            const url = document.getElementById('newLinkUrl').value;
            if(name && url) {
                userLinks.push({ name, url });
                localStorage.setItem('dev-links', JSON.stringify(userLinks));
                DevSearch('renderLinks', userLinks);
                document.getElementById('newLinkName').value = ''; document.getElementById('newLinkUrl').value = '';
            }
        }

        document.getElementById('searchInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') triggerSearch(); });

        // --- EXTRAS: RELOJ, NOTAS Y CURSOR ---
        setInterval(() => {
            const now = new Date();
            document.getElementById('clockWidget').innerText = now.toLocaleTimeString('es-ES');
            document.getElementById('dateWidget').innerText = now.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'short' });
        }, 1000);

        const dot = document.getElementById('cursorDot'); const outline = document.getElementById('cursorOutline');
        window.addEventListener('mousemove', (e) => {
            dot.style.left = `${e.clientX}px`; dot.style.top = `${e.clientY}px`;
            outline.style.left = `${e.clientX}px`; outline.style.top = `${e.clientY}px`;
        });

        function initCursorTrackers() {
            document.querySelectorAll('a, button, input, textarea').forEach(el => {
                el.addEventListener('mouseenter', () => outline.style.transform = 'translate(-50%, -50%) scale(1.5)');
                el.addEventListener('mouseleave', () => outline.style.transform = 'translate(-50%, -50%) scale(1)');
            });
        }

        document.getElementById('rgbSpeedRange').addEventListener('input', (e) => DevSearch('setRGBspeed', 16 - e.target.value));
        const notes = document.getElementById('devNotes'); notes.value = localStorage.getItem('dev-launcher-notes') || '';
        notes.addEventListener('input', (e) => localStorage.setItem('dev-launcher-notes', e.target.value));

        DevSearch('renderLinks', userLinks);
    </script>
</body>
</html>
