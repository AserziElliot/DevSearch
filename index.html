<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevSearch En-Página OS</title>
    <style>
        :root {
            --bg-dark: #05070f;
            --panel-bg: rgba(10, 15, 30, 0.7);
            --text-main: #f1f5f9;
            --rgb-speed: 6s; 
        }

        @keyframes rgb-cycle {
            0% { border-color: #ff0055; box-shadow: 0 0 20px rgba(255, 0, 85, 0.4); }
            50% { border-color: #00ffff; box-shadow: 0 0 20px rgba(0, 255, 255, 0.4); }
            100% { border-color: #ff0055; box-shadow: 0 0 20px rgba(255, 0, 85, 0.4); }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: system-ui, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow: hidden;
            height: 100vh;
        }

        #main {
            height: 100vh; display: flex; flex-direction: column; align-items: center; padding-top: 5vh;
            background: radial-gradient(circle at center, rgba(15, 23, 42, 0.8) 0%, var(--bg-dark) 100%);
        }

        .search-container { width: 100%; max-width: 850px; padding: 0 20px; text-align: center; }
        .search-container h1 { font-size: 2.5rem; margin-bottom: 15px; color: #fff; }

        .search-box {
            display: flex; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px; padding: 8px 24px; align-items: center; margin-bottom: 20px;
            animation: rgb-cycle var(--rgb-speed) linear infinite;
        }
        .search-box input[type="text"] {
            flex-grow: 1; padding: 12px 0; font-size: 16px; border: none; outline: none;
            background: transparent; color: #fff; font-family: inherit;
        }
        .search-box button {
            padding: 10px 20px; background: #fff; border: none; border-radius: 14px; 
            font-weight: bold; cursor: pointer; transition: transform 0.2s;
        }
        .search-box button:hover { transform: scale(1.02); }

        /* --- CONTENEDOR DONDE SE CARGAN LOS RESULTADOS --- */
        .search-results-wrapper {
            width: 100%; height: 65vh; background: rgba(10, 15, 30, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 16px;
            overflow: hidden; display: none; /* Se muestra solo al buscar */
            backdrop-filter: blur(10px);
        }
        .search-results-wrapper.active { display: block; animation: rgb-cycle var(--rgb-speed) linear infinite; }
        
        #searchFrame { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div id="main">
        <div class="search-container">
            <h1>Dev<span>Search</span></h1>
            
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Busca en la web aquí mismo..." autocomplete="off">
                <button onclick="ejecutarBusqueda()">Buscar</button>
            </div>

            <div id="resultsWrapper" class="search-results-wrapper">
                <iframe id="searchFrame" name="searchFrame"></iframe>
            </div>
        </div>
    </div>

    <script>
        function ejecutarBusqueda() {
            const query = document.getElementById('searchInput').value.trim();
            const wrapper = document.getElementById('resultsWrapper');
            const frame = document.getElementById('searchFrame');

            if (query !== '') {
                // Activamos el contenedor visual
                wrapper.classList.add('active');
                
                // Usamos el motor libre de DuckDuckGo en su versión HTML incrustable
                frame.src = `https://html.duckduckgo.com/html/?q=${encodeURIComponent(query)}`;
            }
        }

        // Detectar la tecla Enter para buscar directamente
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') ejecutarBusqueda();
        });
    </script>
</body>
</html>
